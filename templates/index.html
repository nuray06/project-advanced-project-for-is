<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobScope KZ — Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Mulish:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="landing">
  <nav class="top-nav">
    <div class="logo">Job<span>Scope</span> KZ</div>
    <div class="nav-actions">
      <a href="/dashboard" class="nav-link">Open Dashboard →</a>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-glow"></div>
    <div class="badge">Kazakhstan IT Job Market</div>
    <h1>
      Analytics of<br>
      <span class="highlight">IT Vacancies</span><br>
      and AI Career Assistant
    </h1>
    <p class="subtitle">
      Explore salaries, skills, cities, experience levels, and get a profession recommendation based on your resume.
    </p>
    <a href="/dashboard" class="btn-primary">Start Analysis →</a>
  </section>

  <div class="stats" id="statsGrid">
    <div class="stat-item">
      <span class="stat-value" id="statTotal">—</span>
      <span class="stat-label">Jobs in dataset</span>
    </div>

    <div class="stat-item">
      <span class="stat-value" id="statCompanies">—</span>
      <span class="stat-label">Companies</span>
    </div>

    <div class="stat-item">
      <span class="stat-value" id="statAvg">—</span>
      <span class="stat-label">Average salary</span>
    </div>
  </div>

  <script src="/static/script.js"></script>
  <script>
    loadLandingStats();
  </script>
</body>
</html>
