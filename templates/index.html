<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>JobScope KZ</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/style.css">
</head>

<body class="landing">

  <header class="top-nav">
    <div class="logo">Job<span>Scope</span> KZ</div>

    <div class="nav-actions">
      <a href="/dashboard" class="nav-link" data-i18n="openDashboard">Open Dashboard →</a>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-glow"></div>

      <div class="badge" data-i18n="badge">Kazakhstan job market</div>

      <h1>
        <span data-i18n="hero1">Analytics of</span>
        <br>
        <span class="highlight" data-i18n="hero2">IT vacancies</span>
        <br>
        <span data-i18n="hero3">and AI Career Assistant</span>
      </h1>

      <p class="subtitle" data-i18n="subtitle">
        Explore skills, cities, vacancies, and get a profession recommendation using your skills or resume.
      </p>

      <a href="/dashboard" class="btn-primary" data-i18n="start">Start analysis →</a>
    </section>

    <section class="stats">
      <div class="stat-item">
        <span class="stat-value" id="statTotal">—</span>
        <span class="stat-label" data-i18n="jobsInBase">Jobs in dataset</span>
      </div>

      <div class="stat-item">
        <span class="stat-value" id="statCompanies">—</span>
        <span class="stat-label" data-i18n="companies">Companies</span>
      </div>

      <div class="stat-item">
        <span class="stat-value" id="statAvg">—</span>
        <span class="stat-label" data-i18n="avgSalary">Average salary</span>
      </div>
    </section>
  </main>

  <script src="/static/script.js"></script>
  <script>
    loadLandingStats();
  </script>

</body>
</html>
